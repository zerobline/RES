document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

work.<\u002Fp>\n        <div style=\"display:flex; align-items:center; gap:20px; flex-wrap:wrap;\">\n          <a href=\"#contact\" style=\"text-decoration:none; background:#7E9362; color:#F5EFE4; font-weight:600; font-size:0.95rem; padding:15px 30px; border-radius:8px; box-shadow:0 2px 14px rgba(126,147,98,0.32);\" style-hover=\"box-shadow:0 6px 22px rgba(126,147,98,0.5);\">Book a free trial session<\u002Fa>\n          <a href=\"#how\" style=\"text-decoration:none; color:#48565F; font-size:0.92rem; font-weight:500; text-decoration-line:underline; text-underline-offset:3px; text-decoration-color:#CABEAA;\" style-hover=\"color:#1C3A5E;\">How it works ↓<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:52px; padding-top:26px; border-top:1px solid #DAD1C0; display:flex; gap:14px 30px; flex-wrap:wrap;\">\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#8C9C6E;\"><\u002Fspan>CHF 20–30 / session<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width: 7px; height: 7px; border-radius: 50%; background: rgb(140, 156, 110);\"><\u002Fspan>Ages 7–16<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#8C9C6E;\"><\u002Fspan>Patient &amp; experienced<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#8C9C6E;\"><\u002Fspan>Weekly, in term time<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#8C9C6E;\"><\u002Fspan>Cambridge aligned learning<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; font-size:0.82rem; color:#74808A; font-weight:500;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#8C9C6E;\"><\u002Fspan>Structured Phonics programme<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:0 1 330px; min-width:260px; position:relative;\">\n        \n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHAT I OFFER -->\n  <div id=\"what\" style=\"background:#F5EFE4; padding:88px 5vw;\">\n    <div style=\"max-width:1000px; margin:0 auto;\">\n      <div style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#74808A; margin-bottom:16px;\">What we work on<\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:700; font-size:clamp(1.9rem,3.5vw,2.6rem); letter-spacing:-0.02em; line-height:1.15; margin-bottom:18px;\">Support that goes beyond homework<\u002Fh2>\n      <p style=\"font-size:1.02rem; color:#48565F; max-width:560px; line-height:1.7; margin-bottom:48px;\">Every child is different. Sessions are shaped around what your child actually needs not a fixed syllabus. I offer structured English lessons for children, combining the trusted Cambridge English Young Learners framework with a phonics-based approach, that helps children develop strong reading, speaking and vocabulary skills.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:1px; background:#DED5C4; border:1px solid #DED5C4; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"3\" width=\"14\" height=\"18\" rx=\"2\"><\u002Frect><line x1=\"9\" y1=\"8\" x2=\"15\" y2=\"8\"><\u002Fline><line x1=\"9\" y1=\"12\" x2=\"15\" y2=\"12\"><\u002Fline><line x1=\"9\" y1=\"16\" x2=\"13\" y2=\"16\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Homework support<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">Working through school assignments with guidance not just the answers.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 5h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H10l-4 4V6a1 1 0 0 1 1-1z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Speaking confidence<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">Real conversation practice in a safe, unhurried space.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 6c-1.6-1-4.2-1.5-6.2-1.5V18c2 0 4.6.5 6.2 1.5 1.6-1 4.2-1.5 6.2-1.5V4.5c-2 0-4.6.5-6.2 1.5z\"><\u002Fpath><line x1=\"12\" y1=\"6\" x2=\"12\" y2=\"19.5\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Reading &amp; vocabulary<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">Building a richer word bank through books and discussion.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 20l1-4.2L15.5 5.3a1.8 1.8 0 0 1 2.5 0l.7.7a1.8 1.8 0 0 1 0 2.5L8.2 19z\"><\u002Fpath><line x1=\"13.5\" y1=\"7.3\" x2=\"16.7\" y2=\"10.5\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Grammar &amp; writing<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">Clear explanations, practised until they stick.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 4l1.9 4.3L18 10l-4.1 1.7L12 16l-1.9-4.3L6 10l4.1-1.7z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Motivation &amp; self-belief<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">Helping children feel capable with the foundation everything builds on.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF; padding:30px 28px; display:flex; flex-direction:column; gap:14px;\">\n          <div style=\"width:42px; height:42px; background:#E9EDDB; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#4F6138;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 15l5-5 3.2 3.2L20 6\"><\u002Fpath><path d=\"M15.5 6H20v4.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.08rem; font-weight:600;\">Going beyond school<\u002Fh3>\n          <p style=\"font-size:0.9rem; color:#48565F; line-height:1.6;\">For children ready to stretch further than the swiss curriculum allows.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ABOUT -->\n  <div id=\"about\" style=\"background:#1C3A5E; color:#F5EFE4; padding:88px 5vw;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <div>\n        <div style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#A7B988; margin-bottom:16px;\">About me<\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces',serif; font-weight:700; font-size:clamp(1.9rem,3.5vw,2.5rem); letter-spacing:-0.02em; line-height:1.15; margin-bottom:18px; color:#F5EFE4;\">A familiar face, not a formal tutor<\u002Fh2>\n        <p style=\"font-size:1rem; color:rgba(250,250,248,0.72); max-width:680px; line-height:1.7; margin-bottom:32px;\">My name is Rosie. I am a native English speaker, local to Riehen and a mother of two. I know what it takes for children to feel genuinely at ease with a new adult and how much that matters for learning. Lessons are designed to be fun, interactive and encouraging, helping every child to feel comfortable, motivated and proud of their progress.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px;\">\n          <div style=\"background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:22px;\">\n            <div style=\"font-size:0.7rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:#A7B988; margin-bottom:10px;\">Background<\u002Fdiv>\n            <p style=\"font-size:0.88rem; color:rgba(250,250,248,0.75); line-height:1.6;\">Experience as a <strong style=\"color: rgb(250, 250, 248); font-weight: 600;\">Tagesmutter<\u002Fstrong> and with <strong style=\"color: rgb(250, 250, 248); font-weight: 600;\" data-cc-id=\"cc-12\">Basel Children's Trust<\u002Fstrong>&nbsp;used to children of all ages and needs.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:22px;\">\n            <div style=\"font-size:0.7rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:#A7B988; margin-bottom:10px;\">My approach<\u002Fdiv>\n            <p style=\"font-size:0.88rem; color:rgba(250,250,248,0.75); line-height:1.6;\">Calm, patient and always kind. Mistakes are part of learning, never something to fear.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:22px;\">\n            <div style=\"font-size:0.7rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:#A7B988; margin-bottom:10px;\">The language<\u002Fdiv>\n            <p style=\"font-size:0.88rem; color:rgba(250,250,248,0.75); line-height:1.6;\">Natural rhythm, pronunciation and everyday vocabulary the things textbooks can't replicate.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:22px;\">\n            <div style=\"font-size:0.7rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:#A7B988; margin-bottom:10px;\">After session one<\u002Fdiv>\n            <p style=\"font-size:0.88rem; color:rgba(250,250,248,0.75); line-height:1.6;\">Honest feedback on your child's level, strengths and where a little focus helps most.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PRICING -->\n  <div id=\"pricing\" style=\"background:#EFE7D8; padding:88px 5vw;\">\n    <div style=\"max-width:1000px; margin:0 auto;\">\n      <div style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#74808A; margin-bottom:16px;\">Session options<\u002Fdiv>\n      <h2 style=\"font-family:'Fraunces',serif; font-weight:700; font-size:clamp(1.9rem,3.5vw,2.6rem); letter-spacing:-0.02em; line-height:1.15; margin-bottom:18px;\">Simple, fair pricing<\u002Fh2>\n      <p style=\"font-size:1.02rem; color:#48565F; max-width:560px; line-height:1.7; margin-bottom:48px;\">45–60 minute sessions, during school weeks. No hidden costs.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; max-width:800px;\">\n        <div style=\"background:#E9EDDB; border:1.5px solid #7E9362; border-radius:16px; padding:36px 32px; position:relative; box-shadow:0 8px 24px rgba(126,147,98,0.18);\">\n          <div style=\"position:absolute; top:-12px; left:24px; background:#7E9362; color:#FFFFFF; font-size:0.7rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; padding:5px 12px; border-radius:20px;\">Most popular<\u002Fdiv>\n          <div style=\"font-size:0.78rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:#74808A; margin-bottom:16px;\">1:1 Tutoring<\u002Fdiv>\n          <div style=\"font-family:'Fraunces',serif; fo  font-size:1.1rem; font-weight:600; margin-bottom:8px;\">Four weekly sessions<\u002Fh3>\n          <p style=\"font-size:0.88rem; color:#48565F; line-height:1.65;\">If it is a good fit, we continue with a block of four lessons, establishing a regular learning routine.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"width:56px; height:56px; border-radius:50%; background:#F5EFE4; border:2px solid #DED5C4; display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:1.3rem; font-weight:700; color:#7E9362; margin-bottom:20px;\">4<\u002Fdiv>\n          <h3 style=\"font-family:'Fraunces',serif; font-size:1.1rem; font-weight:600; margin-bottom:8px;\">Growing confidence<\u002Fh3>\n          <p style=\"font-size:0.88rem; color:#48565F; line-height:1.65;\">Over time, your child becomes more independent, comfortable and capable.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTACT -->\n  <div id=\"contact\" style=\"background:#EFE7D8; padding:88px 5vw;\">\n    <div id=\"contact-grid\" style=\"max-width:1000px; margin:0 auto;\">\n      <div class=\"c-info\">\n        <div style=\"font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#74808A; margin-bottom:16px;\">Get in touch<\u002Fdiv>\n        <h2 style=\"font-family:'Fraunces',serif; font-weight:700; font-size:clamp(1.9rem,3.5vw,2.6rem); letter-spacing:-0.02em; line-height:1.15; margin-bottom:18px;\">Book a trial session<\u002Fh2>\n        <p style=\"font-size:1.02rem; color:#48565F; max-width:440px; line-height:1.7;\">Tell me a little about your child and what you are looking for. I will get back to you to discuss time slots and answer any questions.<\u002Fp>\n        <p style=\"margin-top:20px; font-size:0.85rem; color:#74808A; line-height:1.6;\">Sessions run during school weeks in Riehen.<br>No sessions during school holidays or weekends.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\ padding:30px 5vw; font-size:0.82rem;\">English Tutoring · <span style=\"color:#7E9362;\">Riehen / Basel<\u002Fspan> · Sessions during school term only<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      btnRef: (el) => { this.btn = el; },\n      okRef: (el) => { this.ok = el; },\n      submit: (e) => {\n        e.preventDefault();\n        const form = e.target;\n        const body = new URLSearchParams(new FormData(form)).toString();\n        const done = () => {\n          if (this.ok) this.ok.style.display = 'block';\n          if (this.btn) this.btn.style.display = 'none';\n        };\n        fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })\n          .then(done).catch(done);\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
